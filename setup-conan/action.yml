name: Configure Conan (requires VPN)
description: Add remote neboskreb-conan
inputs:
  conan-password:
    required: true
    description: Password for Conan remote
  remote:
    required: false
    description: The IP or DNS of the Conan server (production)
    default: http://10.8.0.1:9300
  snapshots:
    required: false
    description: The IP or DNS of the Conan server (snapshots)
    default: http://10.8.0.1:9301

runs:
    using: 'composite'
    steps:
    - name: add Neboskreb repo to Conan
      run: |
        export CONAN_REVISIONS_ENABLED=1
        conan remote add neboskreb-conan ${{inputs.remote}} --index 0
        conan remote login -p ${{inputs.conan-password}} neboskreb-conan neboskreb@narod.ru
        conan remote add neboskreb-snapshots ${{inputs.snapshots}} --index 1
        conan remote login -p ${{inputs.conan-password}} neboskreb-snapshots neboskreb@narod.ru
      shell: bash

    - name: set up Conan profile
      run: conan profile detect
      shell: bash

    - name: show the configuration
      run: conan config show "*"
      shell: bash
